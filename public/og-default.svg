<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  <circle cx="900" cy="200" r="300" fill="#1E3A5F" opacity="0.5"/>
  <circle cx="300" cy="500" r="200" fill="#1E3A5F" opacity="0.3"/>
  <!-- Logo mark -->
  <g transform="translate(100, 100)">
    <rect width="80" height="80" rx="20" fill="url(#accent)"/>
    <text x="40" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="white">A</text>
  </g>
  <!-- Title -->
  <text x="100" y="280" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-0.02em">Autional</text>
  <!-- Subtitle -->
  <text x="100" y="340" font-family="system-ui,sans-serif" font-size="28" fill="#94A3B8" letter-spacing="-0.01em">Enterprise Identity &amp; Access Management</text>
  <!-- Decorative line -->
  <rect x="100" y="380" width="120" height="4" rx="2" fill="url(#accent)"/>
  <!-- Tagline -->
  <text x="100" y="440" font-family="system-ui,sans-serif" font-size="20" fill="#64748B">Authentication · SSO · MFA · Multi-Tenancy · Audit · Developer APIs</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0F172A" opacity="0.8"/>
  <text x="600" y="612" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#475569">www.autional.com</text>
</svg>
